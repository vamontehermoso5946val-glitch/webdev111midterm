<!DOCTYPE html>
<html>
<head>
    <title>VibeStream Pro - Login</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: Arial; text-align: center; padding-top: 100px; }
        .login-box { 
            background-color: #222; width: 300px; margin: 0 auto; padding: 40px; 
            border: 2px solid #9d4edd; border-radius: 15px;
            transition: 0.3s; /* This makes the movement smooth */
        }
        .login-box:hover { transform: scale(1.02); }
        .logo { width: 100px; border-radius: 50%; border: 2px solid white; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; }
        .btn { 
            display: block; background-color: #9d4edd; color: white; padding: 12px; 
            text-decoration: none; border-radius: 20px; font-weight: bold; margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #7b2cbf; transform: translateY(-3px); }
        .links { margin-top: 20px; font-size: 13px; }
        .links a { color: #aaa; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="Image_20260212_002545_039.png" class="logo">
        <h2>VibeStream Pro</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <a href="home.html" class="btn">LOG IN</a>
        <div class="links"><a href="register.html">No account? <b>Register here</b></a></div>
    </div>
</body>
</html>
