<!DOCTYPE html>
<html>
<head>
    <title>VibeStream Pro - Library</title>
  <style>
        body { background-color: #000; color: white; font-family: Arial; margin: 0; padding-bottom: 120px; }
        .sidebar { width: 200px; background-color: #000; height: 100vh; float: left; border-right: 1px solid #333; padding: 20px; box-sizing: border-box; }
        .menu-item { padding: 12px; margin: 8px 0; background-color: #1a1a1a; border-radius: 5px; text-decoration: none; display: block; color: white; }
        .active { background-color: #9d4edd; }
        .main { margin-left: 200px; padding: 40px; text-align: center; }
        .song-grid { display: flex; justify-content: center; gap: 20px; }
        .card { background-color: #121212; width: 200px; padding: 20px; border-radius: 10px; text-decoration: none; color: white; display: block; border: 1px solid #333; }
        .card:hover { border-color: #9d4edd; }
        .card img { width: 100%; border-radius: 8px; }

        /* --- THE PLAYER BAR --- */
        .player-footer {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background-color: #050505; border-top: 1px solid #333;
            display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
        }
        .now-playing { display: flex; align-items: center; width: 30%; }
        .now-playing img { width: 55px; height: 55px; border-radius: 4px; margin-right: 15px; }
        audio { width: 40%; filter: invert(100%) hue-rotate(180deg); }
        /* --- Updated Card Hover for Music Pages --- */
.card { 
    background-color: #121212; 
    width: 200px; 
    padding: 20px; 
    border-radius: 10px; 
    text-decoration: none; 
    color: white; 
    display: block; 
    border: 1px solid #333;
    
    /* ADD THESE 2 LINES FOR THE SMOOTH EFFECT */
    transition: 0.3s; 
    cursor: pointer;
}

.card:hover { 
    /* THIS MAKES IT LIFT UP AND GLOW */
    transform: translateY(-10px) scale(1.05); 
    border-color: #9d4edd; 
    background-color: #1a1a1a;
    box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
}

.card img { 
    width: 100%; 
    border-radius: 8px; 
    margin-bottom: 10px;
    transition: 0.3s;
}

.card:hover img {
    filter: brightness(1.2);
}
    </style>
</head>
<body>
 <div class="sidebar">
        <h2 style="color:#9d4edd">VibeStream Pro</h2>
        <a href="home.html" class="menu-item">Home</a>
        <a href="music.html" class="menu-item active">Music Library</a>
        <a href="playlists.html" class="menu-item">Playlists</a>
        <a href="settings.html" class="menu-item">Settings</a>
        <a href="Login.html" class="menu-item">Log Out</a>
        
    </div>
    
    <div class="main">
        <h1>Pierce The Veil</h1>
        <div class="song-grid">
            <a href="music.html" class="card">
                <img src="images.jpg">
                <p>A Match Into Water</p>
            </a>
            <a href="music_bulls.html" class="card" style="border-color:#9d4edd;">
                <img src="images.jpg">
                <p>Bulls in the Bronx</p>
            </a>
       <a href="music_contagious.html" class="card">
                <img src="images.jpg">
                <b>I Don't Care If You're Contagious</b>
            </a>
        </div>
    </div>

    <div class="player-footer">
        <div class="now-playing">
            <img src="images.jpg">
            <div><b>Bulls in the Bronx</b>
            <br><span style="color:#aaa; font-size:12px;">Pierce The Veil</span></div>
        </div>
        <audio controls>
            <source src="Bulls%20in%20the%20Bronx%20-%20Pierce%20the%20Veil%20-%20HighQualityMusic.mp3" type="audio/mpeg">
        </audio>
    </div>
</body>
</html>
