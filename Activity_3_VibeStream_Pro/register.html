<!DOCTYPE html>
<html>
<head>
    <title>VibeStream - Register</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: Arial; text-align: center; padding-top: 100px; }
        .reg-box { 
            background-color: #222; width: 320px; margin: 0 auto; padding: 40px; 
            border: 2px solid #9d4edd; border-radius: 15px; transition: 0.3s;
        }
        .reg-box:hover { transform: scale(1.02); }
        input { width: 90%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; }
        .btn { 
            display: block; background-color: #9d4edd; color: white; padding: 12px; 
            text-decoration: none; border-radius: 20px; font-weight: bold; margin-top: 20px; transition: 0.3s;
        }
        .btn:hover { background-color: #7b2cbf; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="reg-box">
        <h2 style="color:#9d4edd">Create Account</h2>
        <input type="text" placeholder="Full Name"><input type="email" placeholder="Email"><input type="text" placeholder="Username"><input type="password" placeholder="Password">
        <a href="index.html" class="btn" onclick="alert('Account created!')">REGISTER</a>
        <p style="font-size: 12px; margin-top: 15px;"><a href="Login.html" style="color:#aaa; text-decoration:none;">Back to Login</a></p>
    </div>
</body>
</html>
