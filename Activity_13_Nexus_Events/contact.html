<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Events | Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Nexus Events</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="tickets.html">Tickets</a>
            <a href="venue.html">Venue</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="admin.html">Admin</a>
        </div>
        <button onclick="togglePartyMode()" id="partyBtn" class="party-mode-btn">Party Mode: OFF</button>
    </nav>

    <div class="container" style="max-width: 650px; padding-top: 40px; padding-bottom: 80px;">
        <h2 style="text-align: center; margin-bottom: 25px; font-size: 2.5rem;">Questions?</h2>
        <div class="blocky" style="background: #f1f3e9; padding: 40px;">
            <p style="font-weight: 700; margin-bottom: 25px; text-align: center;">Drop us a message and our team will get back to you within 24 hours.</p>
            
            <form id="contactForm">
                <label style="display: block; font-weight: 700; margin-bottom: 5px;">Your Name</label>
                <input type="text" id="contactName" placeholder="Full Name" required style="margin-bottom: 20px;">
                
                <label style="display: block; font-weight: 700; margin-bottom: 5px;">Email Address</label>
                <input type="email" id="contactEmail" placeholder="you@email.com" required style="margin-bottom: 20px;">

                <label style="display: block; font-weight: 700; margin-bottom: 5px;">Topic</label>
                <select id="contactTopic" required style="margin-bottom: 20px; width: 100%; padding: 12px; border: 2px solid black; font-weight: 700;">
                    <option value="" disabled selected>What's this about?</option>
                    <option value="Tickets">Ticket Issues</option>
                    <option value="Venue">Venue Access</option>
                    <option value="VIP">VIP Perks</option>
                    <option value="General">General Inquiry</option>
                </select>
                
                <label style="display: block; font-weight: 700; margin-bottom: 5px;">How can we help?</label>
                <textarea id="contactMessage" placeholder="Your message..." rows="6" required style="margin-bottom: 25px;"></textarea>
                
                <button type="submit" class="btn-blocky" style="background: #e0e0e0; width: 100%;">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 40px 0;">
            <div style="background: var(--accent-red); border: 2px solid black; padding: 8px 20px; border-radius: 50px; font-weight: 800;">Nexus Events • Vibrant Pop Nights</div>
            <div style="font-size: 0.8rem; font-weight: 600;">© 2026 Nexus Events y BosskramAteru. All rights reserved.</div>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
