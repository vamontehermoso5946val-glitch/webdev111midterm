<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HealthSync | Access Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Trust-Blue Theme Variables */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --dark: #0f172a;
            --text-muted: #64748b;
        }

        /* Specific login styling to create a unique look */
        body {
            /* Professional Gradient Background */
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-out;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-top: 5px solid var(--primary); /* Professional Accent */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            color: var(--primary);
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 1.2rem;
        }

        .login-header h2 {
            margin: 10px 0 0 0;
            font-size: 1.75rem;
            color: var(--dark);
        }

        .login-header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.95rem;
        }

        /* Button override for full width login */
        .btn-login {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="logo">HEALTHSYNC CLINIC</div>
            <h2>Welcome</h2>
            <p>Please enter your details to sign in.</p>
        </div>
        
        <form id="loginForm">
            <div class="field" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem;">Email Address</label>
                <input type="email" id="loginEmail" placeholder="name@company.com" required 
                       style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box;">
            </div>
            
            <div class="field" style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem;">Password</label>
                <input type="password" id="loginPass" placeholder="••••••••" required 
                       style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box;">
            </div>
            
            <button type="submit" class="btn-login">
                Sign In to Portal
            </button>
        </form>

        <p style="text-align: center; font-size: 0.9rem; margin-top: 25px; color: var(--text-muted);">
            New to the clinic? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create an account</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            // Retrieve users from local storage
            const users = JSON.parse(localStorage.getItem('healthSyncUsers')) || [];

            // Look for a matching user
            const user = users.find(u => u.email === email && u.password === pass);

            if (user) {
                localStorage.setItem('isLoggedIn', 'true'); 
                console.log("Access Granted");
                window.location.href = 'index.html';
            } else {
                alert("The email or password provided is incorrect.");
            }
        });
    </script>
</body>
</html>
