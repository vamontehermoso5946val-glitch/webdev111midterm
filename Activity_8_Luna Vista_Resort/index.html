<!DOCTYPE html>
<html>
<head>
    <title>Luna Vista Resort | Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; animation: fadeIn 1.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Navigation Styles */
        .header { background-color: #002366; color: white; padding: 20px 50px; overflow: hidden; border-bottom: 5px solid #d4af37; }
        .logo { float: left; margin: 0; }
        .nav { float: right; margin-top: 15px; }
        .nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
        .nav a:hover { color: #d4af37; }

        /* Slideshow Container */
        .slideshow-container {
            max-width: 800px;
            position: relative;
            margin: 40px auto;
            border: 5px solid white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            background-color: white;
        }

        /* Hide images by default */
        .mySlides {
            display: none;
            text-align: center;
        }

        .mySlides img {
            width: 100%;
            height: 450px;
            object-fit: cover;
        }

        /* Next & previous buttons */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            margin-top: -22px;
            padding: 16px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            background-color: rgba(0,0,0,0.5);
            user-select: none;
        }

        .next { right: 0; border-radius: 3px 0 0 3px; }
        .prev:hover, .next:hover { background-color: rgba(0,0,0,0.8); }

        /* Caption text */
        .text {
            color: #f2f2f2;
            font-size: 20px;
            padding: 8px 12px;
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            background-color: rgba(0,0,0,0.4);
        }

        .welcome-text {
            text-align: center;
            padding: 20px;
        }

        .btn { background: #002366; color: white; padding: 15px 30px; text-decoration: none; display: inline-block; margin-top: 10px; border-radius: 5px; }
        .btn:hover { background: #d4af37; color: black; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo"> Luna Vista Resort</h1>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="rooms.html">Rooms</a>
			<a href="foods.html">Dining</a>
            <a href="booking.html">Book Now</a>
        </div>
    </div>

    <div class="welcome-text">
        <h2>Welcome to Your Paradise Escape</h2>
        <p>Use the arrows below to see our beautiful resort views.</p>
    </div>

    <!-- Slideshow Section -->
    <div class="slideshow-container">

        <!-- Slide 1 -->
        <div class="mySlides">
            <img src="https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=800">
            <div class="text">Our Luxury Infinity Pool</div>
        </div>

        <!-- Slide 2 -->
        <div class="mySlides">
            <img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=800">
            <div class="text">Sunset Beach Views</div>
        </div>

        <!-- Slide 3 -->
        <div class="mySlides">
            <img src="https://images.unsplash.com/photo-1540541338287-41700207dee6?w=800">
            <div class="text">World Class Dining</div>
        </div>

        <!-- Buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <div style="text-align: center; margin-bottom: 50px;">
        <a href="rooms.html" class="btn">Start Your Journey Now</a>
    </div>

    <script>
        // Slideshow Logic
        var slideIndex = 1;
        showSlides(slideIndex);

        // Next/previous controls
        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function showSlides(n) {
            var i;
            var slides = document.getElementsByClassName("mySlides");
            if (n > slides.length) {slideIndex = 1}
            if (n < 1) {slideIndex = slides.length}
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slides[slideIndex-1].style.display = "block";
        }
    </script>
	<p align=center> Created by: Vincent A. Montehermoso from BSEMC 1-Y2-1 </p>

</body>
</html>
