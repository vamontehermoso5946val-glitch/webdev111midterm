<!DOCTYPE html>
<html>
<head>
    <title>Your Receipt | Luna Vista</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #ddd; padding-top: 50px; }
        .receipt { background: white; width: 350px; margin: auto; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.3); border-top: 10px dashed #002366; }
        .center { text-align: center; }
        .line { border-bottom: 1px solid black; margin: 10px 0; }
        .btn { background: #002366; color: white; padding: 10px; width: 100%; border: none; cursor: pointer; margin-top: 20px; }
    </style>
    <script>
        window.onload = function() {
            document.getElementById('display-name').innerText = localStorage.getItem('guestName');
            document.getElementById('display-room').innerText = localStorage.getItem('roomType');
        }
    </script>
</head>
<body>
    <div class="receipt">
        <h2 class="center">LUNA VISTA RESORT</h2>
        <p class="center">Official Reservation Receipt</p>
        <div class="line"></div>
        <p><b>GUEST:</b> <span id="display-name">Guest</span></p>
        <p><b>ROOM:</b> <span id="display-room">Selected Room</span></p>
        <p><b>STATUS:</b> CONFIRMED</p>
        <div class="line"></div>
        <p class="center">Thank you for booking!<br>See you soon.</p>
        <button class="btn" onclick="window.print()">Print Receipt</button>
        <p class="center"><a href="home.html" style="font-size: 12px;">Return to Home</a></p>
    </div>
</body>
</html>
